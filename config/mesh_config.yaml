# MeSH Discovery Pipeline Configuration

# Discovery Limits
max_levels: 3
max_children_per_node: 5
max_total_terms: 50

# Hierarchical Thresholds (Publication Count)
threshold_level_1: 1000
threshold_level_2: 500
threshold_level_3: 100

# Significance Score Pruning
significance_score_threshold: 0.1
fallback_threshold: 100

# NLP Configuration
stop_words: the,and,for,with,from,that,this,these
ner_suffixes: mab,nib,vir,afil,stat,tinib

# Trend Analysis Configuration
initial_l: 1.0
initial_k: 0.1
midpoint_divisor: 2.0
