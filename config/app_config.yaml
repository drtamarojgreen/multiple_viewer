# CBT Graph Viewer Application Configuration

# Console Dimensions
console_width: 80
console_height: 25

# UI Settings
show_analytics_panel: false
viewer_overlay_mode: false
auto_scale_depth: true
show_topic_weights: true
allow_multi_focus: false

# Viewport
viewer_zoom: 1.0
node_padding: 1
quiet_mode: false
camera_lerp_speed: 5.0

# Visuals
node_weight_threshold_high: 10
node_weight_threshold_low: 5

# Render Layers
max_spatial_depth: 16
